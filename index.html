<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA Stream & River Tracker - USGS Real-Time Data</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="header-content">
                <div class="header-title">
                    <h1>🌊 PA Stream & River Tracker</h1>
                    <p class="subtitle">Real-Time USGS Water Data Monitoring</p>
                </div>
                <div class="header-controls">
                    <button id="refreshBtn" class="btn btn-primary">
                        <span class="btn-icon">🔄</span>
                        <span>Refresh Data</span>
                    </button>
                    <span id="lastUpdate" class="last-update">Last updated: --</span>
                </div>
            </div>
        </header>

        <div id="loading" class="loading-container">
            <div class="spinner"></div>
            <p>Loading stream data from USGS...</p>
        </div>

        <div id="error" class="error-message" style="display: none;"></div>

        <div class="stations-grid" id="stationsGrid">
            <!-- Stations will be populated here -->
        </div>

        <footer class="main-footer">
            <p>Data provided by <a href="https://www.usgs.gov/faqs/what-national-water-information-system-nwis" target="_blank">USGS National Water Information System</a></p>
            <p>Updated every 5 minutes • <span id="footerTime">--</span></p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
