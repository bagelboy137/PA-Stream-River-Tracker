<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA Stream & River Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 SE PA Stream & River Tracker</h1>
            <p>Real-time USGS Water Data - Gauge Height, Discharge & Temperature</p>
            <div class="header-controls">
                <button id="refreshBtn" class="btn btn-primary">🔄 Refresh Now</button>
                <span id="lastUpdate" class="last-update">Last updated: --</span>
            </div>
        </header>

        <div class="stations-grid" id="stationsGrid">
            <!-- Stations will be populated here -->
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading stream data...</p>
        </div>

        <div id="error" class="error-message" style="display: none;"></div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
